<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<meta name="googlebot" content="noindex, nofollow">
<title>旅程 · Trips</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1f1a14;
    --paper: #f4f1ea;
    --muted: rgba(31,26,20,0.55);
    /* Kyoto */
    --kyoto-ink: #1a1208;
    --kyoto-gold: #c4964a;
    --kyoto-cream: #f7f1e8;
    /* Taichung */
    --tc-ink: #22302a;
    --tc-sage: #5f8060;
    --tc-cream: #f5f1e6;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { scroll-behavior: smooth; }

  body {
    min-height: 100vh;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Serif TC', serif;
    font-weight: 300;
    display: flex;
    flex-direction: column;
    background-image:
      radial-gradient(ellipse 50% 60% at 15% 20%, rgba(196,150,74,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 85% 80%, rgba(95,128,96,0.07) 0%, transparent 60%);
  }

  /* ── HEADER ── */
  .site-header {
    text-align: center;
    padding: 96px 24px 56px;
  }
  .site-eyebrow {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 14px; letter-spacing: 5px; color: var(--muted);
    text-transform: uppercase; margin-bottom: 20px;
  }
  .site-title {
    font-size: clamp(44px, 9vw, 76px); font-weight: 300;
    letter-spacing: 6px; line-height: 1; margin-bottom: 16px;
  }
  .site-title-en {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: clamp(15px, 2.4vw, 20px); letter-spacing: 6px; color: var(--muted);
  }
  .header-rule {
    width: 48px; height: 1px; background: var(--ink); opacity: 0.25;
    margin: 32px auto 0;
  }

  /* ── TRIP GRID ── */
  .trips {
    flex: 1;
    max-width: 860px; width: 100%;
    margin: 0 auto; padding: 0 24px 64px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
  }
  .trip-card {
    position: relative; display: block; text-decoration: none;
    color: inherit; overflow: hidden;
    background: var(--card-bg, #fff);
    border: 1px solid rgba(31,26,20,0.12);
    padding: 40px 32px 36px;
    min-height: 280px;
    display: flex; flex-direction: column; justify-content: space-between;
    transition: transform 0.35s ease, box-shadow 0.35s ease, border-color 0.35s ease;
  }
  .trip-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--accent);
  }
  .trip-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 18px 40px -18px rgba(31,26,20,0.35);
    border-color: var(--accent);
  }
  .trip-index {
    font-family: 'Cormorant Garamond', serif; font-size: 13px;
    letter-spacing: 3px; color: var(--accent); text-transform: uppercase;
  }
  .trip-body { margin-top: auto; }
  .trip-kanji {
    font-size: 52px; font-weight: 300; letter-spacing: 4px;
    color: var(--card-ink); line-height: 1; margin-bottom: 8px;
  }
  .trip-en {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 16px; letter-spacing: 4px; color: var(--accent); margin-bottom: 18px;
  }
  .trip-dates {
    font-family: 'Cormorant Garamond', serif; font-size: 15px;
    letter-spacing: 1.5px; color: var(--card-ink); opacity: 0.75; margin-bottom: 6px;
  }
  .trip-desc { font-size: 13px; line-height: 1.7; color: rgba(31,26,20,0.55); }
  .trip-cta {
    margin-top: 20px; display: inline-flex; align-items: center; gap: 8px;
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 14px; letter-spacing: 2px; color: var(--accent);
  }
  .trip-cta .arrow { transition: transform 0.3s ease; }
  .trip-card:hover .trip-cta .arrow { transform: translateX(5px); }

  .card-kyoto { --accent: var(--kyoto-gold); --card-ink: var(--kyoto-ink); --card-bg: #fffdf8; }
  .card-taichung { --accent: var(--tc-sage); --card-ink: var(--tc-ink); --card-bg: #fbfcf7; }

  /* ── FOOTER ── */
  footer { text-align: center; padding: 32px 24px 48px; }
  .footer-text {
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 13px; letter-spacing: 2px; color: var(--muted);
  }

  @media (max-width: 700px) {
    .site-header { padding: 64px 20px 40px; }
    .trips { grid-template-columns: 1fr; gap: 16px; padding: 0 16px 48px; }
    .trip-card { min-height: 220px; padding: 32px 24px 28px; }
    .trip-kanji { font-size: 44px; }
  }
</style>
</head>
<body>

<header class="site-header">
  <p class="site-eyebrow">Patty's Travels</p>
  <h1 class="site-title">旅程</h1>
  <p class="site-title-en">Journeys</p>
  <div class="header-rule"></div>
</header>

<main class="trips">

  <a class="trip-card card-kyoto" href="kyoto.html">
    <div class="trip-index">01 · Japan</div>
    <div class="trip-body">
      <div class="trip-kanji">京都</div>
      <div class="trip-en">Kyoto</div>
      <div class="trip-dates">5月22日 — 25日</div>
      <div class="trip-desc">慢活京都·四天三夜。美食、庭院、茶室為主軸。</div>
      <span class="trip-cta">開啟行程 <span class="arrow">→</span></span>
    </div>
  </a>

  <a class="trip-card card-taichung" href="taichung.html">
    <div class="trip-index">02 · Taiwan</div>
    <div class="trip-body">
      <div class="trip-kanji">台中</div>
      <div class="trip-en">Taichung</div>
      <div class="trip-dates">7月31日 — 8月2日</div>
      <div class="trip-desc">草悟道慢遊·三天兩夜。美食、甜點、散步為主軸。</div>
      <span class="trip-cta">開啟行程 <span class="arrow">→</span></span>
    </div>
  </a>

</main>

<footer>
  <p class="footer-text">Good food · Slow days · Beautiful places</p>
</footer>

</body>
</html>
